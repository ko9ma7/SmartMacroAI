# SmartMacroAI — Build & Release
# Trigger: push tag v* (e.g. v1.5.6)
# Produces: portable self-contained ZIP
#
# Created by Pham Duy - Giai phap tu dong hoa thong minh.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore -r win-x64

      - name: Publish
        run: dotnet publish SmartMacroAI.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -p:IncludeNativeLibrariesForSelfExtract=true -o publish/win-x64 --no-restore

      - name: Remove .pdb files
        shell: pwsh
        run: |
          $pdbs = Get-ChildItem -Path "publish/win-x64" -Recurse -Filter "*.pdb" -ErrorAction SilentlyContinue
          if ($pdbs) { $pdbs | Remove-Item -Force }

      - name: Create ZIP
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v',''
          $zipName = "SmartMacroAI-v${version}-win-x64.zip"
          Compress-Archive -Path "publish/win-x64/*" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-x64
          path: ${{ env.ZIP_NAME }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.zip
